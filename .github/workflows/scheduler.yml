name: crawler-snapshot
run-name: >-
  crawler-snapshot | ${{ github.event_name }} | limit=${{ github.event.inputs.limit_per_source || '2' }}

on:
  schedule:
    # 01:23 UTC = 09:23 Asia/Shanghai
    - cron: '23 1 * * *'
  workflow_dispatch:
    inputs:
      limit_per_source:
        description: 'Max candidate pages per source'
        required: false
        default: '2'
      include_disabled:
        description: 'Include disabled fallback sources'
        required: false
        default: 'false'
      refresh_existing:
        description: 'Re-fetch already frozen pages'
        required: false
        default: 'false'
      probe_only:
        description: 'Probe only without saving new snapshots'
        required: false
        default: 'false'
      source_ids:
        description: 'Comma-separated source ids, empty means all enabled sources'
        required: false
        default: ''
      keep_runs:
        description: 'How many recent run directories to keep after the workflow finishes'
        required: false
        default: '10'
      prune_unreferenced_snapshots:
        description: 'Delete snapshot files not referenced by page_catalog.json'
        required: false
        default: 'true'
      prune_catalog_without_snapshots:
        description: 'Drop filtered/no-snapshot rows from page_catalog.json'
        required: false
        default: 'true'
      commit_changes:
        description: 'Commit crawler metadata and publish data-branch artifacts'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: crawler-snapshot-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: '1'
  TZ: UTC

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show workflow inputs
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "limit_per_source=${{ github.event.inputs.limit_per_source || '2' }}"
          echo "include_disabled=${{ github.event.inputs.include_disabled || 'false' }}"
          echo "refresh_existing=${{ github.event.inputs.refresh_existing || 'false' }}"
          echo "probe_only=${{ github.event.inputs.probe_only || 'false' }}"
          echo "source_ids=${{ github.event.inputs.source_ids || '' }}"
          echo "keep_runs=${{ github.event.inputs.keep_runs || '10' }}"
          echo "prune_unreferenced_snapshots=${{ github.event.inputs.prune_unreferenced_snapshots || 'true' }}"
          echo "prune_catalog_without_snapshots=${{ github.event.inputs.prune_catalog_without_snapshots || 'true' }}"
          echo "commit_changes=${{ github.event.inputs.commit_changes || 'true' }}"

      - name: Run crawler tests
        run: |
          python3 crawler/run_tests.py
          python3 crawler/validate_manual_curated_urls.py
          python3 crawler/probe_manual_curated_urls.py
          python3 crawler/probe_data_branch_remote.py

      - name: Run snapshot crawler
        shell: bash
        run: |
          set -euo pipefail

          LIMIT="${{ github.event.inputs.limit_per_source || '2' }}"
          INCLUDE_DISABLED="${{ github.event.inputs.include_disabled || 'false' }}"
          REFRESH_EXISTING="${{ github.event.inputs.refresh_existing || 'false' }}"
          PROBE_ONLY="${{ github.event.inputs.probe_only || 'false' }}"
          SOURCE_IDS_RAW="${{ github.event.inputs.source_ids || '' }}"

          EXTRA_ARGS=(--limit-per-source "$LIMIT")

          if [[ "$INCLUDE_DISABLED" == "true" ]]; then
            EXTRA_ARGS+=(--include-disabled)
          fi
          if [[ "$REFRESH_EXISTING" == "true" ]]; then
            EXTRA_ARGS+=(--refresh-existing)
          fi
          if [[ "$PROBE_ONLY" == "true" ]]; then
            EXTRA_ARGS+=(--probe-only)
          fi
          if [[ -n "$SOURCE_IDS_RAW" ]]; then
            IFS=',' read -ra SOURCE_IDS <<< "$SOURCE_IDS_RAW"
            for source_id in "${SOURCE_IDS[@]}"; do
              trimmed="$(echo "$source_id" | xargs)"
              if [[ -n "$trimmed" ]]; then
                EXTRA_ARGS+=(--source "$trimmed")
              fi
            done
          fi

          python3 crawler/run_snapshot.py "${EXTRA_ARGS[@]}"
          python3 crawler/report_snapshots.py --limit 50 > crawler/state/catalog-report.md
          python3 crawler/build_source_status_report.py > crawler/state/source-status-report.md
          python3 crawler/build_manual_curated_backlog.py > crawler/state/manual-curated-backlog.md
          python3 crawler/export_snapshot_relations.py
          python3 crawler/export_page_catalog_partitions.py
          python3 crawler/export_source_health_partitions.py
          python3 crawler/export_latest_run_partitions.py
          python3 crawler/export_page_records.py
          python3 crawler/audit_publish_bundle.py
          python3 crawler/build_data_branch_manifest.py
          python3 crawler/check_data_branch_readiness.py || true
          python3 crawler/build_preflight_report.py
          python3 crawler/build_preflight_report.py
          python3 crawler/verify_framework.py

      - name: Prune old runs and orphan snapshots
        if: ${{ github.event.inputs.probe_only != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          KEEP_RUNS="${{ github.event.inputs.keep_runs || '10' }}"
          PRUNE_SNAPSHOTS="${{ github.event.inputs.prune_unreferenced_snapshots || 'true' }}"
          PRUNE_CATALOG="${{ github.event.inputs.prune_catalog_without_snapshots || 'true' }}"
          EXTRA_ARGS=(--keep-runs "$KEEP_RUNS")
          if [[ "$PRUNE_SNAPSHOTS" == "true" ]]; then
            EXTRA_ARGS+=(--prune-snapshots)
          fi
          if [[ "$PRUNE_CATALOG" == "true" ]]; then
            EXTRA_ARGS+=(--prune-catalog-without-snapshots)
          fi
          python3 crawler/prune_snapshots.py "${EXTRA_ARGS[@]}"
          python3 scripts/build_crawler_reports.py
          python3 crawler/build_state_index.py
          python3 crawler/build_final_push_summary.py
          python3 crawler/build_state_index.py
          python3 crawler/build_final_push_summary.py

      - name: Upload crawler artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crawler-snapshot-${{ github.run_id }}
          retention-days: 14
          path: |
            crawler/state/
            crawler/runs/
            crawler/snapshots/
          if-no-files-found: warn

      - name: Commit crawler metadata back to the current branch
        if: ${{ github.event.inputs.commit_changes != 'false' }}
        run: python3 scripts/commit_crawler_metadata.py

      - name: Publish crawler artifacts to data branch
        if: ${{ github.event.inputs.commit_changes != 'false' && github.event.inputs.probe_only != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="$(python3 scripts/print_latest_run_id.py)"
          python3 scripts/push_crawler_to_data_branch.py --branch data --remote origin --run-id "$RUN_ID" --latest-only
